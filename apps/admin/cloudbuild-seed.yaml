# Cloud Build config for the seed (database seeding) image.
# Uses Kaniko layer caching — deps layer cached when package.json unchanged.
#
# Usage:
#   cd apps/admin
#   gcloud builds submit --config cloudbuild-seed.yaml \
#     --project hf-admin-prod --region europe-west2 \
#     --substitutions=_TAG=latest .

substitutions:
  _TAG: latest

steps:
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=Dockerfile'
      - '--context=.'
      - '--target=seed'
      - '--destination=europe-west2-docker.pkg.dev/hf-admin-prod/hf-docker/hf-seed:${_TAG}'
      - '--cache=true'
      - '--cache-repo=europe-west2-docker.pkg.dev/hf-admin-prod/hf-docker/hf-seed/cache'
      - '--cache-ttl=720h'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
