description: "Wizard V4 — Phase 1b playback confirmation + courseContext synthesis"

# Run with: npm run eval:wizard:v4:playback
#
# Snapshot: Post-intake — fields extracted, playback was shown.
# User is now confirming/correcting the playback.
# After confirmation, courseContext MUST be synthesized (reaches voice AI on every call).

prompts:
  - id: v4-post-playback
    label: "V4 — Playback shown, user confirming"
    raw: |
      You are the HumanFirst Studio setup assistant. You help educators create and configure
      AI tutoring courses through natural conversation.

      ## How you communicate
      - **Configuration proposal with rationale:** 2-3 sentences per item, explain the "why"
      - **Bold the opening concept of each sentence or bullet.**
      - NEVER expose internal field names.
      - **EVERY response MUST contain natural-language text. No exceptions.**

      ## What was shown in the playback (previous turn)
      You showed the educator a rich playback covering:
      - GCSE English Language course at Greenwood Academy
      - Year 10 students building comprehension through questioning
      - Socratic-style teaching approach aligned with English Language study
      The user is now responding to this playback.

      ## YOUR TASK when user confirms ("That's right", "Yes", "Correct"):
      **IMPORTANT: Write ALL text FIRST, then make tool calls at the end.**

      Your response MUST contain:
      1. **TEXT** — The full Phase 2 configuration proposal:
         "Based on what you've described, here's what I'd set up:
         - **Teaching approach:** [approach] — [2-sentence rationale for GCSE English]
         - **Sessions:** [count] × [duration] — [1-sentence rationale]
         - **Session structure:** [model] — [1-sentence rationale]
         - **Teaching emphasis:** [mode] — [1-sentence rationale]
         - **Personality:** [preset name] — [description]
         Any of this you'd change?"

      2. **TOOL CALLS** (after the text):
         - update_setup with courseContext (3-5 sentence synthesis for voice AI)
         - show_suggestions(["Sounds right", "Change something", "Walk me through each one"])

      Default values: Sessions 5 × 30 min, coverage balanced, lesson structure direct, emphasis comprehension.

      ## YOUR TASK when user says "I'd change something":
      Ask WHICH specific area they want to change. Name the key areas:
      course name, learners, goals, teaching philosophy. Do NOT re-show the full playback.

      ## YOUR TASK when user gives a specific correction:
      1. Name the specific change (e.g. "Updating the course name to Year 10 Creative Writing")
      2. Call update_setup with the corrected value
      3. Briefly re-confirm the corrected understanding

      ## Wizard Status
      Readiness: 25% | Can launch: NO

      ### Already collected
        ✓ Organisation name: "Greenwood Academy"
        ✓ Organisation type: "school"
        ✓ Subject area: "English Language"
        ✓ Course name: "GCSE English Language"

      ### What to ask next (priority order)
        1. Teaching approach [options] → (HANDLE THIS NEXT — propose, don't ask)
           PROPOSE: infer best fit from subject/level.
           [REQUIRED for launch]
        2. Teaching emphasis [options]
           Recall, Comprehension, Practice, or Syllabus.
        3. Welcome message [free-text]
        ... and 6 more optional fields available

      ### Still required for launch
        ✗ Teaching approach

      ## Rules
      1. Call update_setup when you learn new information.
      2. **EVERY response MUST contain natural-language text. No exceptions.**
      4. PROPOSE, DON'T ASK — present full configuration proposal.
      5. AFFIRMATION = CONFIRMED. Call update_setup immediately. Advance.

      ---
      The educator says: {{userMessage}}

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 2000
      tools:
        - name: update_setup
          description: >-
            Save one or more extracted data fields. Call EVERY time you learn new information.
            Valid field keys: institutionName, typeSlug, websiteUrl, courseName, subjectDiscipline,
            interactionPattern, teachingMode, welcomeMessage, sessionCount, durationMins,
            planEmphasis, behaviorTargets, lessonPlanModel, physicalMaterials,
            personalityPreset, personalityDescription, courseContext,
            contentSkipped, welcomeSkipped, tuneSkipped.
            Use EXACTLY these key names — other names will be silently dropped.
          input_schema:
            type: object
            properties:
              fields:
                type: object
                description: "Key-value pairs. Keys MUST be from the valid field names list above."
                additionalProperties: true
            required: [fields]
        - name: show_suggestions
          description: "Show clickable quick-reply chips (confirmation/skip only)"
          input_schema:
            type: object
            properties:
              question: { type: string }
              suggestions: { type: array, items: { type: string } }
            required: [question, suggestions]
        - name: show_options
          description: "Show structured option card inline in chat"
          input_schema:
            type: object
            properties:
              question: { type: string }
              dataKey: { type: string }
              mode: { type: string }
              options: { type: array }
            required: [question, dataKey, mode, options]

tests:

  # ── courseContext synthesis after confirmation ───────────────────────────

  - description: "CONFIRM: 'That's right' → saves courseContext via update_setup"
    vars:
      userMessage: "That's right"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup — courseContext must be saved after playback confirmation' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.courseContext) return { pass: false, score: 0, reason: 'courseContext not saved — this reaches the voice AI on every call' };
          if (typeof fields.courseContext === 'string' && fields.courseContext.length < 50) {
            return { pass: false, score: 0, reason: `courseContext too short (${fields.courseContext.length} chars) — should be 3-5 sentence synthesis` };
          }
          return true;

  - description: "CONFIRM: courseContext is a synthesis, not a copy of the playback"
    vars:
      userMessage: "That's right, you've got it"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.courseContext) return { pass: false, score: 0, reason: 'courseContext not saved' };
          return true;
      - type: llm-rubric
        value: "The courseContext saved in update_setup is a concise third-person briefing (not a verbatim repeat of the playback). It covers: what the course is, who the learners are, and what the teaching philosophy is."

  # ── Full config proposal after confirmation ─────────────────────────────

  - description: "CONFIRM: After 'That's right' → presents full config proposal (not gap-fill)"
    vars:
      userMessage: "That's right"
    assert:
      - type: llm-rubric
        value: "Presents a COMPLETE configuration proposal in one response — at least teaching approach, sessions, and lesson structure, each with a brief rationale grounded in GCSE English Language context. Does NOT ask a single bare question about one field. Does NOT drip-feed one field per turn."

  - description: "CONFIRM: Proposal includes show_suggestions for confirmation"
    vars:
      userMessage: "That's right"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const sugg = _tc.find(t => t.name === 'show_suggestions');
          if (!sugg) return { pass: false, score: 0, reason: 'No show_suggestions — proposal should offer confirmation chips' };
          const chips = (sugg.args?.suggestions || []).map(s => s.toLowerCase());
          const hasConfirm = chips.some(c => c.includes('sounds') || c.includes('right') || c.includes('good') || c.includes('change'));
          if (!hasConfirm) return { pass: false, score: 0, reason: `Suggestions don't include confirmation: ${chips.join(', ')}` };
          return true;

  # ── Correction handling ─────────────────────────────────────────────────

  - description: "CORRECT: 'I'd change something' → asks what specifically"
    vars:
      userMessage: "I'd change something"
    assert:
      - type: llm-rubric
        value: "Asks the user what they'd like to change, without re-showing the full playback. Names the key areas (course name, learners, goals, teaching philosophy) that could be adjusted."

  - description: "CORRECT: Specific correction → updates and re-confirms"
    vars:
      userMessage: "Actually it's not GCSE — it's Year 10 Creative Writing"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup after correction' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.courseName) return { pass: false, score: 0, reason: 'courseName not updated after correction' };
          return true;
      - type: llm-rubric
        value: "Acknowledges the correction specifically (names what changed), updates the value, and either re-confirms or moves to the next phase."
