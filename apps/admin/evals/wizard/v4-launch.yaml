description: "Wizard V4 — launch summary + course creation"

# Run with: npm run eval:wizard:v4:launch
# Included in: npm run eval:wizard:v4:all
#
# Snapshot: All fields collected, Can launch: YES.
# V4 has NO show_actions tool — confirmation is text-based or via show_suggestions.
# create_course ONLY after explicit user confirmation.

prompts:
  - id: v4-launch-new
    label: "V4 — Launch phase (all collected, new course)"
    raw: |
      You are the HumanFirst Studio setup assistant. You help educators create and configure
      AI tutoring courses through natural conversation.

      ## How you communicate
      - Launch summary: list all items with actual values, end with "Ready to create your course?"
      - Confirming a saved value: 1 sentence, name what comes next
      - **Bold the opening concept of each sentence or bullet.**
      - NEVER respond with only tools and no text.

      ## Wizard Status
      Readiness: 100% | Can launch: YES

      ### Already collected
        ✓ Organisation name: "Greenwood Academy"
        ✓ Organisation type: "school"
        ✓ Subject area: "English Language"
        ✓ Course name: "GCSE English Language"
        ✓ Teaching approach: "socratic"
        ✓ Teaching emphasis: "comprehension"
        ✓ Welcome message: "Welcome to your GCSE English Language course. I'm here to help you practise and improve."
        ✓ Number of sessions: "8"
        ✓ Session duration: "30"
        ✓ Breadth vs depth: "balanced"
        ✓ Personality: "socratic-mentor,clear-instructor"
        ✓ Lesson plan model: "spiral"

      ### What to ask next (priority order)
        All fields collected! Offer to review the setup and create the course.

      ## Phase 5: Launch summary
      Present a structured summary listing ACTUAL collected values:

        "Here's what we've set up:
        - **Organisation:** [institutionName]
        - **Subject:** [subjectDiscipline]
        - **Course:** [courseName]
        - **Approach:** [interactionPattern in plain language]
        - **Sessions:** [sessionCount] × [durationMins] min
        - **Content:** [uploaded / skipped]
        - **Personality:** [preset names + brief description]
        - **Welcome:** [first ~20 words of welcomeMessage]

        Ready to create your course?"

      Then call show_suggestions(["Create & try a call", "Fine-tune more"]).

      NEVER say "here's a summary" without listing actual values.
      The user confirms by saying "yes", "create it", "let's go", etc.
      ONLY call create_course AFTER the user explicitly confirms.
      "Looks good", "let's do it", "ready" = show the summary first, NOT create_course.

      ## Rules
      1. Call update_setup when you learn new information.
      2. ALWAYS include natural-language text with your responses.
      9. NEVER ask "What's next?" — BANNED.

      ---
      The educator says: {{userMessage}}

  - id: v4-launch-existing
    label: "V4 — Launch phase (existing course, draftPlaybookId set)"
    raw: |
      You are the HumanFirst Studio setup assistant. You help educators create and configure
      AI tutoring courses through natural conversation.

      ## How you communicate
      - Launch summary: list all items with actual values
      - **Bold the opening concept of each sentence or bullet.**
      - NEVER respond with only tools and no text.

      ## Wizard Status
      Readiness: 100% | Can launch: YES

      ### Already collected
        ✓ Organisation name: "Riverside Academy"
        ✓ Organisation type: "school"
        ✓ Subject area: "Biology"
        ✓ Course name: "GCSE Biology"
        ✓ Teaching approach: "directive"
        ✓ Teaching emphasis: "syllabus"
        ✓ Number of sessions: "12"
        ✓ Session duration: "45"
        ✓ Personality: "clear-instructor,stretch-mentor"

      Amendment tier: POST-SCAFFOLD (playbookId: pb_xyz789).

      ### What to ask next (priority order)
        All fields collected! Offer to review the setup and create the course.

      ## Phase 5: Launch summary
      Since draftPlaybookId is already set (existing course), show summary then:
      show_suggestions(["Try a call", "Fine-tune more"])
      — NOT "Create & try a call" (course already exists).

      ## Rules
      2. ALWAYS include natural-language text with your responses.

      ---
      The educator says: {{userMessage}}

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 1200
      tools:
        - name: update_setup
          description: "Save collected setup fields"
          input_schema:
            type: object
            properties:
              fields:
                type: object
                additionalProperties: true
            required: [fields]
        - name: show_suggestions
          description: "Show clickable quick-reply chips (confirmation/skip only)"
          input_schema:
            type: object
            properties:
              question: { type: string }
              suggestions: { type: array, items: { type: string } }
            required: [question, suggestions]
        - name: show_options
          description: "Show structured option card inline in chat"
          input_schema:
            type: object
            properties:
              question: { type: string }
              dataKey: { type: string }
              mode: { type: string }
              options: { type: array }
            required: [question, dataKey, mode, options]
        - name: create_course
          description: "Create the course and a test caller"
          input_schema:
            type: object
            properties:
              domainId: { type: string }
              courseName: { type: string }
              interactionPattern: { type: string }
              personalityPreset: { type: string }
            required: [domainId, courseName, interactionPattern]
        - name: update_course_config
          description: "Update course config post-scaffold"
          input_schema:
            type: object
            additionalProperties: true
        - name: suggest_welcome_message
          description: "Generate a welcome message suggestion"
          input_schema:
            type: object
            properties:
              courseName: { type: string }
            required: [courseName]
        - name: mark_complete
          description: "Signal that setup is complete"
          input_schema:
            type: object
            properties:
              playbookId: { type: string }

tests:

  # ── Launch summary — new course ─────────────────────────────────────────

  - description: "LAUNCH: Summary lists actual collected values, not placeholders"
    prompts: [v4-launch-new]
    vars:
      userMessage: "Ready to go"
    assert:
      - type: icontains
        value: "Greenwood Academy"
      - type: icontains
        value: "English Language"
      - type: icontains
        value: "GCSE English Language"
      - type: llm-rubric
        value: "Lists actual collected values: organisation, subject, course name, teaching approach, session count and duration, personality, and welcome message. Ends with a creation prompt like 'Ready to create?' Does NOT say 'here's a summary' without listing the values."

  - description: "LAUNCH: Summary shown when user expresses readiness — does NOT call create_course"
    prompts: [v4-launch-new]
    vars:
      userMessage: "That all looks good to me"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const create = _tc.find(t => t.name === 'create_course');
          if (create) return { pass: false, score: 0, reason: 'create_course called on readiness expression — should show summary first, not create' };
          return true;
      - type: icontains
        value: "Greenwood Academy"

  - description: "LAUNCH: 'Let's do it' = summary, NOT create_course"
    prompts: [v4-launch-new]
    vars:
      userMessage: "Let's do it!"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const create = _tc.find(t => t.name === 'create_course');
          if (create) return { pass: false, score: 0, reason: 'create_course called prematurely — should show summary + confirmation first' };
          return true;

  - description: "LAUNCH: show_suggestions includes creation option"
    prompts: [v4-launch-new]
    vars:
      userMessage: "Ready to go"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const sugg = _tc.find(t => t.name === 'show_suggestions');
          if (!sugg) return { pass: false, score: 0, reason: 'No show_suggestions at launch — user needs creation/fine-tune chips' };
          const chips = (sugg.args?.suggestions || []).map(s => s.toLowerCase());
          const hasCreate = chips.some(c => c.includes('create') || c.includes('try'));
          if (!hasCreate) return { pass: false, score: 0, reason: `No creation chip in suggestions: ${chips.join(', ')}` };
          return true;

  # ── Launch summary — existing course ────────────────────────────────────

  - description: "LAUNCH: Existing course shows 'Try a call' not 'Create'"
    prompts: [v4-launch-existing]
    vars:
      userMessage: "Ready to go"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const sugg = _tc.find(t => t.name === 'show_suggestions');
          if (!sugg) return true;
          const chips = (sugg.args?.suggestions || []).map(s => s.toLowerCase());
          const hasCreate = chips.some(c => c.includes('create'));
          if (hasCreate) return { pass: false, score: 0, reason: 'Existing course should say "Try a call", not "Create" — course already exists' };
          return true;
      - type: icontains
        value: "Riverside Academy"

  - description: "LAUNCH: Existing course summary lists actual values"
    prompts: [v4-launch-existing]
    vars:
      userMessage: "Show me the summary"
    assert:
      - type: icontains
        value: "GCSE Biology"
      - type: icontains
        value: "Riverside Academy"
      - type: llm-rubric
        value: "Lists actual collected values in a structured summary format. Includes organisation, subject, course name, approach, sessions, and personality."

  # ── Fine-tune more ──────────────────────────────────────────────────────

  - description: "LAUNCH: 'Fine-tune more' shows show_suggestions with fine-tune option"
    prompts: [v4-launch-new]
    vars:
      userMessage: "Ready to go"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const sugg = _tc.find(t => t.name === 'show_suggestions');
          if (!sugg) return true;
          const chips = (sugg.args?.suggestions || []).map(s => s.toLowerCase());
          const hasTune = chips.some(c => c.includes('fine') || c.includes('tune') || c.includes('adjust') || c.includes('change'));
          if (!hasTune) return { pass: false, score: 0, reason: `No fine-tune option in suggestions: ${chips.join(', ')}` };
          return true;
