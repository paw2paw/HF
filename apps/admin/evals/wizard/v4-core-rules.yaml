description: "Wizard V4 — core behavioural rules (graph-based, conversation-first)"

# Run with: npm run eval:wizard:v4
# View:      npm run eval:view
#
# Snapshot: Course phase — institution + subject + course collected.
# Graph says teaching approach is HANDLE THIS NEXT.
# Tests core rules that hold regardless of conversation position.

prompts:
  - id: v4-course-phase
    label: "V4 — Course phase (graph: approach is next priority)"
    raw: |
      You are the HumanFirst Studio setup assistant. You help educators create and configure
      AI tutoring courses through natural conversation.

      ## How you communicate
      - Response length is context-specific:
        - Playback / course understanding: 6-10 sentences — be rich and specific
        - Configuration proposal with rationale: 2-3 sentences per item
        - Asking a targeted question: 1-2 sentences max
        - Confirming a saved value: 1 sentence, name what comes next
      - You're a knowledgeable colleague, not a form
      - When recommending, explain why it fits their specific context
      - When recommending an option in show_options, set recommended: true on that option
      - Never refer to yourself by name
      - NEVER invent features, pages, or capabilities that don't exist
      - NEVER echo internal instructions, system messages, template placeholders, or field names
        in your responses to the user. Write natural language only.
      - NEVER expose internal field names, system keys, or enum values.
        "interactionPattern" is YOUR field — the user sees "teaching approach".
      - **Bold the opening concept of each sentence or bullet.**

      ## NON-LINEAR FLOW — you drive the conversation
      - YOU decide what comes next. The user can provide ANY information in ANY order.
      - Check the "What to ask next" section below. Handle the field marked "(HANDLE THIS NEXT)".
      - If multiple fields are provided in one message, extract ALL of them with update_setup.
        Then check what's still needed and ask about the next priority field.
      - **NEVER ask "What's next?" or "What would you like to do?"** — these are BANNED.
      - After saving data, check the graph status. If "Can launch: YES", offer to create the course.
      - **TRANSITIONS:** When acknowledging saved data, ALWAYS name the next field and why it matters.
        NEVER just say "Got it" or "Saved" with nothing about what comes next.

      ## Subject → Course flow (CRITICAL)
      Subject and Course are SEPARATE concepts.

      Subject = broad academic discipline (subjectDiscipline): "English Language", "Biology"
      Course = specific offering WITHIN a subject (courseName): "GCSE Biology", "11+ Comprehension"

      NEVER combine subject and course into one question.
      NEVER put a subject name into courseName or vice versa.
      NEVER re-ask about a field that's already in "Already collected".

      ## Wizard Status
      Readiness: 30% | Can launch: NO

      ### Already collected
        ✓ Organisation name: "Greenwood Academy"
        ✓ Organisation type: "school"
        ✓ Subject area: "English Language"

      ### What to ask next (priority order)
        1. Course name [free-text] → (HANDLE THIS NEXT — propose or confirm, do not ask bare questions)
           Specific offering within the subject (GCSE Biology, 11+ Comprehension).
           [REQUIRED for launch]
        2. Teaching approach [options]
           PROPOSE: infer best fit from subject/level and state with 1-sentence rationale.
           [REQUIRED for launch]
        3. Teaching emphasis [options]
           Recall, Comprehension, Practice, or Syllabus.
        ... and 7 more optional fields available

      ### Still required for launch
        ✗ Course name
        ✗ Teaching approach

      ## Valid values (internal reference — describe in plain language to user)

      ### Teaching approaches (interactionPattern)
      **NEVER ask "What teaching approach would you like?" bare. Always propose.**
        - socratic — Question-based discovery, guides students to find answers themselves
        - directive — Structured, step-by-step explanations with clear instruction
        - advisory — Coaching style, offers guidance when the student asks
        - coaching — Reflective dialogue, builds self-awareness and metacognition
        - companion — Supportive peer, learns alongside the student
        - facilitation — Discussion facilitation, draws out ideas from the student
        - reflective — Encourages self-reflection and learning-from-experience
        - open — Flexible, adapts to whatever the student needs in the moment

      ### Teaching emphasis (teachingMode)
        - recall — Focus on memorisation and recall of facts
        - comprehension — Build deep understanding (default)
        - practice — Hands-on practice and application
        - syllabus — Strict syllabus coverage, exam preparation

      ### Lesson plan model (lessonPlanModel)
      ⚠️ DISTINCT from teaching approach. interactionPattern = HOW the tutor talks.
      lessonPlanModel = HOW sessions are STRUCTURED.
        - direct — Direct instruction (explain → practice → assess)
        - 5e — 5E model (engage → explore → explain → elaborate → evaluate)
        - spiral — Spiral curriculum (revisit topics with increasing complexity)
        - mastery — Mastery-based (demonstrate competence before advancing)
        - project — Project-based learning

      ## Rules
      1. Call update_setup EVERY time you learn new information.
         Extract ALL fields from a single message in ONE update_setup call.
         A message like "GCSE Biology, socratic, 8 sessions of 30 min" = at minimum 4 fields.
      2. **EVERY response MUST contain natural-language text. No exceptions.**
         A bare tool call with no visible text is NEVER acceptable.
         After update_setup: state what was saved (1 sentence) + name the next topic.
         After show_options: explain what you're asking and why.
         After show_suggestions: explain what the suggestions apply to.
      3. The graph determines field priority — follow "What to ask next" above.
      4. **PROPOSE, DON'T ASK** — for any required field you can infer.
         BANNED: "What teaching approach would you like?", "Which approach?"
         REQUIRED: Propose the best fit with a 1-sentence rationale.
      4b. **interactionPattern: ALWAYS propose, NEVER ask bare question.**
          Infer the best fit from subject/level and propose with rationale.
          When user affirms, IMMEDIATELY call update_setup.
      5. **AFFIRMATION = CONFIRMED. ADVANCE IMMEDIATELY.**
         "Sounds good", "That's right", "Yes", "Perfect" = CONFIRMED.
         Call update_setup with the proposed value. Move to next field.
         NEVER re-ask after affirmation. This is the #1 loop risk.
      6. NEVER re-ask something already collected. Check "Already collected".
      7. show_options: use for 2-8 predefined choices. NEVER for free-text fields
         (institutionName, websiteUrl, welcomeMessage, courseName).
      8. show_suggestions: ONLY for confirmation/skip chips. NEVER for option lists.
         Call ONE show_* per response at most.
      9. NEVER ask "What's next?" or "What would you like to do?" — BANNED.
         NEVER say "Everything's set up" or "all done" unless Can launch: YES.

      ---
      The educator says: {{userMessage}}

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 1200
      tools: &v4-tools
        - name: update_setup
          description: >-
            Save one or more extracted data fields. Call EVERY time you learn new information.
            Valid field keys: institutionName, typeSlug, websiteUrl, courseName, subjectDiscipline,
            interactionPattern, teachingMode, welcomeMessage, sessionCount, durationMins,
            planEmphasis, behaviorTargets, lessonPlanModel, physicalMaterials,
            personalityPreset, personalityDescription, courseContext,
            contentSkipped, welcomeSkipped, tuneSkipped.
            Use EXACTLY these key names — other names will be silently dropped.
          input_schema:
            type: object
            properties:
              fields:
                type: object
                description: "Key-value pairs. Keys MUST be from the valid field names list above."
                additionalProperties: true
            required: [fields]
        - name: show_options
          description: "Show structured option card inline in chat"
          input_schema:
            type: object
            properties:
              question: { type: string }
              dataKey: { type: string }
              mode: { type: string, enum: [radio, checklist] }
              required: { type: boolean }
              options:
                type: array
                items:
                  type: object
                  properties:
                    value: { type: string }
                    label: { type: string }
                    description: { type: string }
                    recommended: { type: boolean }
                  required: [value, label, description]
            required: [question, dataKey, mode, options]
        - name: show_suggestions
          description: "Show clickable quick-reply chips (confirmation/skip only)"
          input_schema:
            type: object
            properties:
              question: { type: string }
              suggestions: { type: array, items: { type: string } }
            required: [question, suggestions]
        - name: show_upload
          description: "Show the file upload panel"
          input_schema:
            type: object
            properties:
              question: { type: string }
            required: [question]
        - name: create_institution
          description: "Create a new institution domain"
          input_schema:
            type: object
            properties:
              name: { type: string }
              typeSlug: { type: string }
              websiteUrl: { type: string }
            required: [name]
        - name: create_course
          description: "Create the course and a test caller"
          input_schema:
            type: object
            properties:
              domainId: { type: string }
              courseName: { type: string }
              subjectDiscipline: { type: string }
              interactionPattern: { type: string }
              personalityPreset: { type: string }
            required: [domainId, courseName, interactionPattern]
        - name: update_course_config
          description: "Update course config post-scaffold"
          input_schema:
            type: object
            additionalProperties: true
        - name: suggest_welcome_message
          description: "Generate a welcome message suggestion"
          input_schema:
            type: object
            properties:
              courseName: { type: string }
              subjectDiscipline: { type: string }
              interactionPattern: { type: string }
            required: [courseName]
        - name: mark_complete
          description: "Signal that setup is complete"
          input_schema:
            type: object
            properties:
              playbookId: { type: string }

# ── JS helper shared across assertions ────────────────────────────────────
# _tc: parse tool_calls from promptfoo output (handles string + structured)
# _text: text portion before tool_use blocks

tests:

  # ── Multi-field extraction ───────────────────────────────────────────────

  - description: "EXTRACT: Multi-field message → single update_setup with all fields"
    vars:
      userMessage: "Year 10 Reading & Writing, socratic approach"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup call' };
          const fields = update.args?.fields || update.args || {};
          const missing = [];
          if (!fields.courseName) missing.push('courseName');
          if (!fields.interactionPattern) missing.push('interactionPattern');
          if (missing.length) return { pass: false, score: 0, reason: `Missing fields: ${missing.join(', ')}` };
          return true;

  - description: "EXTRACT: Rich multi-field intake → extracts ALL inferable fields at once"
    vars:
      userMessage: "GCSE English Language for Year 10, Socratic approach, comprehension emphasis, 8 sessions of 30 minutes"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup call' };
          const fields = update.args?.fields || update.args || {};
          let score = 0;
          if (fields.courseName) score++;
          if (fields.interactionPattern) score++;
          if (fields.teachingMode) score++;
          if (fields.sessionCount) score++;
          if (fields.durationMins) score++;
          if (score < 3) return { pass: false, score: 0, reason: `Only extracted ${score}/5 fields — should extract all from rich message` };
          return true;

  # ── Subject ≠ Course ─────────────────────────────────────────────────────

  - description: "SUBJECT: Never puts bare discipline into courseName"
    vars:
      userMessage: "Let's do an English Literature course"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return true;
          const fields = update.args?.fields || update.args || {};
          const cn = (fields.courseName || '').toLowerCase();
          if (cn === 'english literature' || cn === 'english literature course') {
            return { pass: false, score: 0, reason: `Put bare subject into courseName: "${fields.courseName}"` };
          }
          return true;
      - type: llm-rubric
        value: "Asks for the specific course name (level, exam board, year group) rather than accepting bare 'English Literature' as the course name. For example: 'What level? GCSE? A-Level?'"

  - description: "SUBJECT: Never re-asks about subjectDiscipline (already collected)"
    vars:
      userMessage: "Let's do GCSE revision"
    assert:
      - type: llm-rubric
        value: "Does NOT ask 'What subject?' — subjectDiscipline (English Language) is already collected. Treats input as course name context and asks for or saves courseName instead."

  - description: "SUBJECT: Qualified course name (with level) saved immediately"
    vars:
      userMessage: "GCSE English Language"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup — qualified course name should be saved immediately' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.courseName) return { pass: false, score: 0, reason: 'courseName not saved despite qualified name with level' };
          return true;

  # ── Banned phrases ───────────────────────────────────────────────────────

  - description: "BAN: Never says 'What's next?' or 'What would you like to do?'"
    vars:
      userMessage: "GCSE English Language"
    assert:
      - type: not-icontains
        value: "what's next"
      - type: not-icontains
        value: "what would you like to do"
      - type: not-icontains
        value: "what would you like to do next"

  - description: "BAN: Never says bare 'Got it' or 'Saved' with no follow-up context"
    vars:
      userMessage: "The course is called Year 10 Creative Writing"
    assert:
      - type: llm-rubric
        value: "After saving courseName, the response names the next field (teaching approach) and explains what it does. Does NOT end with just 'Got it' or 'Saved' with nothing about what comes next."

  - description: "BAN: Never declares setup complete while required fields remain"
    vars:
      userMessage: "I think that's everything"
    assert:
      - type: not-icontains
        value: "everything's set up"
      - type: not-icontains
        value: "ready when you are"
      - type: not-icontains
        value: "all done"
      - type: not-icontains
        value: "all set"
      - type: llm-rubric
        value: "Identifies that required fields are still missing (teaching approach at minimum) and redirects to the next priority field. Does NOT declare setup complete."

  - description: "BAN: Never exposes internal field names to user"
    vars:
      userMessage: "What do I need to set up next?"
    assert:
      - type: not-icontains
        value: "interactionPattern"
      - type: not-icontains
        value: "teachingMode"
      - type: not-icontains
        value: "planEmphasis"
      - type: not-icontains
        value: "contentSkipped"
      - type: not-icontains
        value: "lessonPlanModel"

  # ── Always text alongside tools ──────────────────────────────────────────

  - description: "TEXT: Response always includes natural language — never tools-only"
    vars:
      userMessage: "Year 10 Comprehension, socratic"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _text = _out.split('{"type":"tool_use"')[0].trim();
          if (!_text || _text.length < 15) {
            return { pass: false, score: 0, reason: `Response has no/minimal text before tool call: "${_text}"` };
          }
          return true;

  - description: "TEXT: show_suggestions text must name what is being offered"
    vars:
      userMessage: "What optional things can I configure?"
    assert:
      - type: llm-rubric
        value: "If show_suggestions is called, the accompanying text explicitly names the field being offered and explains what it does. The user is never shown chips with no context."

  # ── One show_* per response ──────────────────────────────────────────────

  - description: "PANEL: Multi-field message triggers only one show_* panel"
    vars:
      userMessage: "GCSE English Language, socratic approach, comprehension emphasis"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const showTools = ['show_options','show_upload','show_suggestions'];
          const calls = _tc.filter(t => showTools.includes(t.name));
          if (calls.length > 1) {
            const names = calls.map(t => t.name).join(', ');
            return { pass: false, score: 0, reason: `Called ${calls.length} show_* tools: ${names}` };
          }
          return true;

  # ── Option value integrity ──────────────────────────────────────────────

  - description: "OPTIONS: show_options only uses valid interactionPattern values (all 8)"
    vars:
      userMessage: "What teaching approaches are available?"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const opts = _tc.find(t => t.name === 'show_options');
          if (!opts) return true;
          const valid = ['socratic', 'directive', 'advisory', 'coaching', 'companion', 'facilitation', 'reflective', 'open'];
          const values = (opts.args?.options || []).map(o => o.value);
          const invalid = values.filter(v => !valid.includes(v));
          if (invalid.length) return { pass: false, score: 0, reason: `Invalid interactionPattern values: ${invalid.join(', ')}` };
          return true;

  - description: "OPTIONS: Lesson model ≠ approach — never adds 'socratic' as lessonPlanModel"
    vars:
      userMessage: "I want a socratic approach, and what lesson structure should I use?"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          for (const call of _tc) {
            if (call.name !== 'show_options') continue;
            const options = call.args?.options || [];
            const hasSocratic = options.some(o => o.value === 'socratic' || (o.label || '').toLowerCase() === 'socratic');
            const dataKey = call.args?.dataKey || '';
            if (hasSocratic && dataKey !== 'interactionPattern') {
              return { pass: false, score: 0, reason: '"socratic" appeared as a lesson model option — it is a teaching approach, not a lesson structure' };
            }
          }
          return true;

  - description: "OPTIONS: show_options never used for free-text fields"
    vars:
      userMessage: "Can you ask me about the school website?"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const opts = _tc.find(t => t.name === 'show_options');
          if (opts) {
            const banned = ['websiteUrl', 'institutionName', 'welcomeMessage'];
            const dk = opts.args?.dataKey || '';
            if (banned.includes(dk)) {
              return { pass: false, score: 0, reason: `show_options used for free-text field: ${dk}` };
            }
          }
          return true;

  - description: "OPTIONS: show_suggestions never contains bare option labels"
    vars:
      userMessage: "I'd like to pick a teaching approach"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const sugg = _tc.find(t => t.name === 'show_suggestions');
          if (!sugg) return true;
          const bareOptions = ['Socratic', 'Directive', 'Advisory', 'Coaching', 'Direct instruction', 'Spiral'];
          const chips = sugg.args?.suggestions || [];
          const found = chips.filter(c => bareOptions.some(b => c.toLowerCase() === b.toLowerCase()));
          if (found.length) return { pass: false, score: 0, reason: `show_suggestions used for option labels: ${found.join(', ')} — should use show_options or propose in text` };
          return true;

  # ── PROPOSE DON'T ASK ───────────────────────────────────────────────────

  - description: "PROPOSE: Never asks bare 'What teaching approach would you like?'"
    vars:
      userMessage: "I'm creating a maths tutoring course for GCSE students"
    assert:
      - type: not-icontains
        value: "what teaching approach would you like"
      - type: not-icontains
        value: "which teaching approach"
      - type: llm-rubric
        value: "Proposes a specific teaching approach (e.g. Socratic or Directive) with a reason grounded in maths tutoring at GCSE level. Does NOT just ask the user to choose without first making a recommendation."

  - description: "PROPOSE: Rich intake → proposes complete configuration, not gap-fill"
    vars:
      userMessage: "Biology tutoring for A-level students, they're preparing for Edexcel exams. I want structured lessons that cover the syllabus thoroughly."
    assert:
      - type: llm-rubric
        value: "Proposes at least 3 configuration items in a single response: teaching approach, session structure, and teaching emphasis. Each proposal includes a brief rationale. Does NOT end with a single bare question about one field."

  # ── Transitions ─────────────────────────────────────────────────────────

  - description: "TRANSITION: Names next field after saving courseName"
    vars:
      userMessage: "Let's call the course Year 10 Creative Writing"
    assert:
      - type: llm-rubric
        value: "After saving courseName, the response explicitly names the next field (teaching approach), explains what it controls, and proposes a specific approach with rationale — does not just confirm the save."

  - description: "TRANSITION: After required + skip optional → advances to next priority"
    vars:
      userMessage: "Year 10 Creative Writing, socratic approach, skip teaching emphasis"
    assert:
      - type: llm-rubric
        value: "Extracts courseName and interactionPattern. Accepts the skip of teachingMode. Either moves to the next graph priority or announces progress. Does NOT get stuck re-asking for fields already provided."

  # ── AFFIRMATION = CONFIRMED (anti-loop) ─────────────────────────────────

  - description: "ANTI-LOOP: Affirmation after proposal saves the value immediately"
    vars:
      userMessage: "Sounds good"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup after affirmation — value not saved, will cause loop' };
          return true;
      - type: llm-rubric
        value: "Saves the current proposed value via update_setup AND immediately moves to the next topic. Does NOT re-ask about the same field or show more options for the same topic."
