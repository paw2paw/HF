description: "Wizard V4 — welcome message flow (suggest + accept/skip)"

# Run with: npm run eval:wizard:v4:welcome
#
# Tests the suggest_welcome_message → accept/modify/skip flow.
# Critical: "Use this welcome" must save immediately (infinite loop prevention).

prompts:
  - id: v4-welcome-phase
    label: "V4 — Welcome message phase"
    raw: |
      You are the HumanFirst Studio setup assistant. You help educators create and configure
      AI tutoring courses through natural conversation.

      ## How you communicate
      - Confirming a saved value: 1 sentence, name what comes next
      - **Bold the opening concept of each sentence or bullet.**
      - NEVER respond with only tools and no text.

      ## Welcome message flow (MANDATORY — prevents infinite loop)
      1. Call suggest_welcome_message with course context.
         Its tool result contains: { "ok": true, "suggestion": "<text>" }
      2. Write the suggestion text in your response so the user can read it.
      3. Call show_suggestions(["Use this welcome", "Make it warmer", "Skip for now"])
      4. When user says "Use this welcome": extract the suggestion and IMMEDIATELY
         call update_setup({ fields: { welcomeMessage: "<that suggestion>" } }).
         Do NOT ask again. Do NOT re-call suggest_welcome_message.
      5. When user says "Skip for now": call update_setup({ fields: { welcomeSkipped: true } })
      6. welcomeMessage is SATISFIED once either welcomeMessage or welcomeSkipped is in setupData.
         NEVER ask about welcome message again after either is set.

      NEVER mix style-adjustment suggestions ("Make it warmer") with topic transitions
      ("Now let's add content…"). Either finish the welcome topic or skip it.

      ## Wizard Status
      Readiness: 70% | Can launch: NO

      ### Already collected
        ✓ Organisation name: "Greenwood Academy"
        ✓ Organisation type: "school"
        ✓ Subject area: "English Language"
        ✓ Course name: "GCSE English Language"
        ✓ Teaching approach: "socratic"
        ✓ Teaching emphasis: "comprehension"
        ✓ Number of sessions: "8"
        ✓ Session duration: "30"

      ### What to ask next (priority order)
        1. Welcome message [free-text] → (HANDLE THIS NEXT)
           What the student hears on their first call. Use suggest_welcome_message.
        2. Breadth vs depth [options]
        3. Personality [options]
        ... and 2 more optional fields available

      ### Still required for launch
        (none — all required fields collected)

      ## Rules
      1. Call update_setup when you learn new information.
      2. ALWAYS include natural-language text.
      5. AFFIRMATION = CONFIRMED. Save and advance.

      ---
      The educator says: {{userMessage}}

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 1000
      tools:
        - name: update_setup
          description: >-
            Save one or more extracted data fields. Call EVERY time you learn new information.
            Valid field keys: institutionName, typeSlug, websiteUrl, courseName, subjectDiscipline,
            interactionPattern, teachingMode, welcomeMessage, sessionCount, durationMins,
            planEmphasis, behaviorTargets, lessonPlanModel, physicalMaterials,
            personalityPreset, personalityDescription, courseContext,
            contentSkipped, welcomeSkipped, tuneSkipped.
            Use EXACTLY these key names — other names will be silently dropped.
          input_schema:
            type: object
            properties:
              fields:
                type: object
                description: "Key-value pairs. Keys MUST be from the valid field names list above."
                additionalProperties: true
            required: [fields]
        - name: show_suggestions
          description: "Show clickable quick-reply chips (confirmation/skip only)"
          input_schema:
            type: object
            properties:
              question: { type: string }
              suggestions: { type: array, items: { type: string } }
            required: [question, suggestions]
        - name: suggest_welcome_message
          description: "Generate a welcome message suggestion based on course context"
          input_schema:
            type: object
            properties:
              courseName: { type: string }
              subjectDiscipline: { type: string }
              interactionPattern: { type: string }
              personalityPreset: { type: string }
            required: [courseName]
        - name: show_options
          description: "Show structured option card inline"
          input_schema:
            type: object
            properties:
              question: { type: string }
              dataKey: { type: string }
              mode: { type: string }
              options: { type: array }
            required: [question, dataKey, mode, options]

tests:

  # ── Welcome message generation ──────────────────────────────────────────

  - description: "WELCOME: Entering welcome phase → calls suggest_welcome_message"
    vars:
      userMessage: "Let's set up the welcome message"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const suggest = _tc.find(t => t.name === 'suggest_welcome_message');
          if (!suggest) return { pass: false, score: 0, reason: 'suggest_welcome_message not called — should generate a welcome message suggestion' };
          return true;

  - description: "WELCOME: suggest_welcome_message includes courseName"
    vars:
      userMessage: "What about the welcome message?"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const suggest = _tc.find(t => t.name === 'suggest_welcome_message');
          if (!suggest) return true;
          const args = suggest.args || {};
          if (!args.courseName) return { pass: false, score: 0, reason: 'courseName not passed to suggest_welcome_message' };
          return true;

  # ── Accept welcome ──────────────────────────────────────────────────────

  - description: "ACCEPT: 'Use this welcome' → saves welcomeMessage immediately (anti-loop)"
    vars:
      userMessage: "Use this welcome"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup — welcome message not saved, will cause infinite loop' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.welcomeMessage) return { pass: false, score: 0, reason: 'welcomeMessage not in update_setup — must save immediately on acceptance' };
          return true;
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const suggest = _tc.find(t => t.name === 'suggest_welcome_message');
          if (suggest) return { pass: false, score: 0, reason: 'suggest_welcome_message called AGAIN after acceptance — should save, not re-generate' };
          return true;

  # ── Skip welcome ────────────────────────────────────────────────────────

  - description: "SKIP: 'Skip for now' → welcomeSkipped: true"
    vars:
      userMessage: "Skip for now"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup — welcomeSkipped not set, wizard will be stuck' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.welcomeSkipped) return { pass: false, score: 0, reason: 'welcomeSkipped not set' };
          return true;

  # ── Style adjustment ────────────────────────────────────────────────────

  - description: "STYLE: 'Make it warmer' → stays on welcome topic (no topic transition)"
    vars:
      userMessage: "Make it warmer"
    assert:
      - type: llm-rubric
        value: "Adjusts the welcome message tone to be warmer. Does NOT simultaneously transition to a new topic (content upload, personality, etc.). Stays focused on the welcome message."
      - type: not-icontains
        value: "now let's"
