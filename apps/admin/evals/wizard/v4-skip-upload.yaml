description: "Wizard V4 — content skip flags + upload trigger"

# Run with: npm run eval:wizard:v4:skip
# Included in: npm run eval:all
#
# Snapshot: Content phase — course fully collected, user can upload or skip.

prompts:
  - id: v4-content-phase
    label: "V4 — Content phase (course complete, upload or skip)"
    raw: |
      You are the Human Fluency setup guide — a knowledgeable assistant helping an educator set up their AI tutor.

      ## Your personality
      - Warm, professional, concise — 1-2 sentences per response, max
      - NEVER ask "What's next?", "What would you like to do?", or any variant. These are BANNED.
      - NEVER just say "Got it" or "Saved" with no context about what comes next.
      - NEVER respond with only tools and no text.

      ## FLOW CONTROL
      When the user skips content upload (says "skip", "later", "no content", "Skip for now"),
      call update_setup({ fields: { contentSkipped: true } }). Without this flag, the wizard
      stays stuck on the Content phase forever.

      When the user EXPLICITLY asks to upload content (any phrasing: "upload", "add materials",
      "review my content", "upload needed"), call show_upload IMMEDIATELY.
      Do not ask clarifying questions. Do not show suggestions. Just show the upload panel.

      ## Phase scaffold

      ### Progress
        ✓ Organisation
        ✓ Subject
        ✓ Course
        → Content (current)
          Welcome
          Fine-Tune
          Launch

      ### Current phase: Content (4 of 7)
      Upload teaching materials for this course. The user can skip if they prefer to add content later.

      ### Already collected
        institutionName: "Greenwood Academy"
        typeSlug: "school"
        domainId: "dom_abc123"
        subjectDiscipline: "English Language"
        courseName: "GCSE English Language"
        interactionPattern: "socratic"

      ## CRITICAL RULES
      1. Call EXACTLY ONE show_* tool per response.
      2. When the user skips content: call update_setup({ fields: { contentSkipped: true } }).
         This is non-negotiable — without it the wizard is permanently stuck.
      11. ALWAYS include natural-language text alongside tool calls.

      ---
      The educator says: {{userMessage}}

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 400
      tools:
        - name: update_setup
          description: "Save collected setup fields"
          input_schema:
            type: object
            properties:
              fields:
                type: object
                additionalProperties: true
            required: [fields]
        - name: show_upload
          description: "Show the file upload panel"
          input_schema:
            type: object
            properties:
              question: { type: string }
            required: [question]
        - name: show_suggestions
          description: "Show clickable quick-reply chips"
          input_schema:
            type: object
            properties:
              question: { type: string }
              suggestions: { type: array, items: { type: string } }
        - name: show_options
          description: "Present options as radio buttons"
          input_schema:
            type: object
            properties:
              question: { type: string }
              dataKey: { type: string }
              mode: { type: string }
              options: { type: array }
            required: [question, dataKey, mode, options]

tests:

  # ── Content skip flags ────────────────────────────────────────────────────

  - description: "SKIP: 'Skip for now' → update_setup with contentSkipped: true"
    vars:
      userMessage: "Skip for now"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup call' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.contentSkipped) {
            return { pass: false, score: 0, reason: 'contentSkipped not set — wizard will be stuck on Content phase' };
          }
          return true;

  - description: "SKIP: 'I'll add content later' → update_setup with contentSkipped: true"
    vars:
      userMessage: "I'll add content later"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup call' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.contentSkipped) {
            return { pass: false, score: 0, reason: 'contentSkipped not set — wizard will be stuck on Content phase' };
          }
          return true;

  # ── Upload trigger ────────────────────────────────────────────────────────

  - description: "UPLOAD: 'I'd like to upload my materials' → show_upload immediately"
    vars:
      userMessage: "I'd like to upload my materials"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const upload = _tc.find(t => t.name === 'show_upload');
          if (!upload) {
            return { pass: false, score: 0, reason: 'User asked to upload but show_upload was not called' };
          }
          return true;
      - type: llm-rubric
        value: "Calls show_upload immediately. Does NOT ask a clarifying question like 'What would you like to upload?' or 'Are you sure?'."

  - description: "UPLOAD: 'Let me add some materials' → show_upload immediately"
    vars:
      userMessage: "Let me add some materials for the course"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const upload = _tc.find(t => t.name === 'show_upload');
          if (!upload) {
            return { pass: false, score: 0, reason: 'User asked to add materials but show_upload was not called' };
          }
          return true;
