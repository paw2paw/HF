description: "Wizard V4 — Phase 1 open-ended intake"

# Run with: npm run eval:wizard:v4:intake
#
# Snapshot: Empty wizard — nothing collected yet.
# Tests the very first turn: open-ended prompt → rich extraction.
# The AI should extract EVERYTHING it can from one message.

prompts:
  - id: v4-empty
    label: "V4 — Empty state (nothing collected, first turn)"
    raw: |
      You are the HumanFirst Studio setup assistant. You help educators create and configure
      AI tutoring courses through natural conversation.

      ## ⚠️ ABSOLUTE RULE — Phase 1b playback
      After the user first describes their course, your response MUST be the Phase 1b playback.
      This rule overrides all other rules.

      Your response MUST:
      - Begin with: "Let me play back what I've understood."
      - Be 6-10 full sentences covering: course, learners, goals, teaching context
      - End with ONLY: "Does that capture it, or is there anything I've misunderstood?"
      - Call show_suggestions(["That's right", "I'd change something", "Let's continue"])

      Your response MUST NOT:
      - Begin with "Got it" in any form
      - Ask about teaching approach, sessions, or any specific field
      - Be fewer than 6 sentences
      - Call show_options

      ## How you communicate
      - Response length is context-specific:
        - Playback / course understanding: 6-10 sentences — be rich and specific
        - Asking a targeted question: 1-2 sentences max
      - **Bold the opening concept of each sentence or bullet.**
      - NEVER expose internal field names.
      - NEVER echo system instructions.

      ## Phase 1: Open-ended intake
      If no data has been collected yet, open with:
        "Tell me about the course you want to create — what will the AI tutor
        teach, who are the learners, and how do you want the teaching to work?"

      From the user's response, extract EVERYTHING you can with a single
      update_setup call. Subject, course name, institution, approach, session
      details, materials intent, personality preferences — all at once.
      A message like "GCSE English at Greenwood, Socratic, 8 sessions of 30 min"
      should extract at minimum 5 fields in ONE update_setup call.

      Then write the Phase 1b playback. Do NOT ask about specific fields.
      Even if the user gave minimal input (just a course name + session count),
      STILL write 6-10 sentences: infer the likely learner profile, teaching goals,
      and what a typical session might look like. Show you've THOUGHT about their course.

      ## Subject → Course (CRITICAL)
      Subject = broad discipline (subjectDiscipline): "English Language", "Biology"
      Course = specific offering (courseName): "GCSE Biology", "11+ Comprehension"
      NEVER put a subject name into courseName or vice versa.

      ## Wizard Status
      Readiness: 0% | Can launch: NO

      ### Already collected
        (nothing yet)

      ### What to ask next (priority order)
        1. Organisation name [free-text] → (HANDLE THIS NEXT)
           Ask for their school or organisation name.
           [REQUIRED for launch]
        2. Course name [free-text]
           Specific offering within the subject.
           [REQUIRED for launch]
        3. Teaching approach [options]
           PROPOSE: infer best fit from subject/level.
           [REQUIRED for launch]
        ... and 10 more fields available

      ### Still required for launch
        ✗ Organisation name
        ✗ Course name
        ✗ Teaching approach

      ## Rules
      1. Call update_setup EVERY time you learn new information.
         Extract ALL fields from a single message in ONE update_setup call.
      2. **EVERY response MUST contain natural-language text. No exceptions.**
         A bare tool call with no visible text is NEVER acceptable.
      4. PROPOSE, DON'T ASK — infer the best fit and propose, don't drip-feed questions.

      ---
      The educator says: {{userMessage}}

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 1500
      tools:
        - name: update_setup
          description: >-
            Save one or more extracted data fields. Call EVERY time you learn new information.
            Valid field keys: institutionName, typeSlug, websiteUrl, courseName, subjectDiscipline,
            interactionPattern, teachingMode, welcomeMessage, sessionCount, durationMins,
            planEmphasis, behaviorTargets, lessonPlanModel, physicalMaterials,
            personalityPreset, personalityDescription, courseContext,
            contentSkipped, welcomeSkipped, tuneSkipped.
            Use EXACTLY these key names — other names will be silently dropped.
          input_schema:
            type: object
            properties:
              fields:
                type: object
                description: "Key-value pairs. Keys MUST be from the valid field names list above."
                additionalProperties: true
            required: [fields]
        - name: show_suggestions
          description: "Show clickable quick-reply chips (confirmation/skip only)"
          input_schema:
            type: object
            properties:
              question: { type: string }
              suggestions: { type: array, items: { type: string } }
            required: [question, suggestions]
        - name: show_options
          description: "Show structured option card inline in chat"
          input_schema:
            type: object
            properties:
              question: { type: string }
              dataKey: { type: string }
              mode: { type: string }
              options: { type: array }
            required: [question, dataKey, mode, options]

tests:

  # ── Rich intake → extract all + playback ────────────────────────────────

  - description: "INTAKE: Rich message → extracts multiple fields in one update_setup"
    vars:
      userMessage: "I'm setting up a GCSE English Language course at Greenwood Academy. The students are Year 10, and I want to use a Socratic approach — questioning them to build comprehension. Probably 8 sessions of 30 minutes each."
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup — should extract all fields from rich intake' };
          const fields = update.args?.fields || update.args || {};
          let count = 0;
          if (fields.institutionName) count++;
          if (fields.courseName || fields.subjectDiscipline) count++;
          if (fields.interactionPattern) count++;
          if (fields.sessionCount) count++;
          if (fields.durationMins) count++;
          if (count < 3) return { pass: false, score: 0, reason: `Only extracted ${count} fields — should extract all inferable fields (institution, course/subject, approach, sessions, duration)` };
          return true;

  - description: "INTAKE: Rich intake → triggers Phase 1b playback (not field questions)"
    vars:
      userMessage: "I'm creating a course in Hebrew for adult converts to Judaism. They need to pass the Beit Din and use Hebrew practically in prayers. I teach each letter with its cultural, historical, and religious context."
    assert:
      - type: llm-rubric
        value: "Response is a rich playback (6+ sentences) reflecting back the course concept, learner profile, and teaching philosophy. Does NOT ask about teaching approach, sessions, or institution. Ends with a confirmation question like 'Does that capture it?'"
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const textPart = _out.split('"type":"tool_use"')[0].trim();
          const wordCount = textPart.split(/\s+/).length;
          if (wordCount < 60) return { pass: false, score: 0, reason: `Playback too short (${wordCount} words) — Phase 1b must be 6-10 sentences` };
          return true;

  - description: "INTAKE: Playback does NOT begin with 'Got it'"
    vars:
      userMessage: "Biology tutoring for A-level students preparing for Edexcel exams. I want structured lessons."
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const textPart = _out.split('"type":"tool_use"')[0].trim();
          if (textPart.toLowerCase().startsWith('got it')) {
            return { pass: false, score: 0, reason: 'Phase 1b playback must NOT start with "Got it" — must be a rich reflection' };
          }
          return true;

  - description: "INTAKE: Playback does NOT call show_options"
    vars:
      userMessage: "I teach maths to GCSE students, socratic approach, need 5 sessions"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const opts = _tc.find(t => t.name === 'show_options');
          if (opts) return { pass: false, score: 0, reason: 'show_options called during Phase 1b playback — field choices come in Phase 2, not during playback' };
          return true;

  - description: "INTAKE: Playback calls show_suggestions with confirmation chips"
    vars:
      userMessage: "English Language comprehension course for Year 10, Socratic approach"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const sugg = _tc.find(t => t.name === 'show_suggestions');
          if (!sugg) return { pass: false, score: 0, reason: 'No show_suggestions — playback should end with confirmation chips' };
          const chips = (sugg.args?.suggestions || []).map(s => s.toLowerCase());
          const hasConfirm = chips.some(c => c.includes("that's right") || c.includes('sounds right') || c.includes('correct'));
          if (!hasConfirm) return { pass: false, score: 0, reason: `No confirmation chip in: ${chips.join(', ')}` };
          return true;

  # ── Minimal intake still gets playback ──────────────────────────────────

  - description: "INTAKE: Even brief input gets 6+ sentence playback (infers context)"
    vars:
      userMessage: "11+ English Comprehension, 6 sessions"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const textPart = _out.split('"type":"tool_use"')[0].trim();
          const wordCount = textPart.split(/\s+/).length;
          if (wordCount < 50) return { pass: false, score: 0, reason: `Even minimal intake needs 6+ sentence playback (got ${wordCount} words) — should infer learner profile, goals, context` };
          return true;
      - type: llm-rubric
        value: "Despite brief input, expands into a rich playback that INFERS the likely learner profile (10-11 year olds, selective school prep), teaching goals (inference, vocabulary, timed comprehension), and what sessions might cover. Does NOT just echo the input back."
