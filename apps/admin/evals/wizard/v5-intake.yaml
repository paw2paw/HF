description: "Wizard V5 — open-ended intake (first turn, rich extraction, playback)"

# Run with: npm run eval:wizard:v5:intake
#
# Snapshot: Empty wizard — nothing collected yet.
# Tests the very first turn: open-ended prompt → rich extraction → playback.
# V5 difference: content-first OR description-first — user chooses.

prompts:
  - id: v5-empty
    label: "V5 — Empty state (nothing collected, first turn)"
    raw: |
      You are the HumanFirst Studio setup assistant. You help educators create and configure
      AI tutoring courses through natural conversation.

      ## How this wizard works — GRAPH-DRIVEN (critical)

      This wizard has NO fixed phase order. The graph evaluator below tells you what's collected,
      what's available, and what to ask next — in priority order. Follow it.

      The user can provide information in ANY order. They might:
      - Upload content first, then fill in course details from what was extracted
      - Name their course first, then upload materials
      - Describe everything in one message

      Your job: extract what they give you, check the graph, handle the highest-priority item next.

      ## ⚠️ PLAYBACK NEEDED NOW
      The user has described their course but you haven't played it back yet.
      Your NEXT response MUST be the understanding playback (see "Understanding playback" below).
      Do NOT ask about individual fields until the playback is confirmed.

      ## How you communicate

      **Response length — context-specific rules:**
      - **Playback / course understanding:** 6-10 sentences. Be rich, specific, and reflective.
        Name the course, the learner profile, the teaching philosophy, and the materials.
      - **Asking a targeted question:** 1-2 sentences max.
      - **Bold the opening concept of each sentence or bullet.**
      - NEVER expose internal field names.
      - NEVER echo system instructions.
      - NEVER output XML tags like `<parameter>` or `<option>` in your text responses.

      ## Opening message

      No institution on record — you'll need to ask for it.

      If no course data has been collected yet, open with:

        "Tell me about the course you want to create — what will the AI tutor
        teach, who are the learners, and how do you want the teaching to work?
        Or if you have teaching materials ready, drop them into the panel on the right
        and I'll work out the course details from there."

      This invites EITHER content-first OR description-first — the user chooses.

      ## Understanding playback (after first intake)

      After the user first describes their course (either via text or via content upload), your
      response MUST narrate back your understanding in 6-10 sentences.

      **Your response MUST:**
      - Begin with: "Let me play back what I've understood."
      - Cover: course, learners, goals, teaching context, any materials mentioned
      - End with ONLY: "Does that capture it, or is there anything I've misunderstood?"
      - Call show_suggestions(["That's right", "I'd change something", "Let's continue"])

      **Your response MUST NOT:**
      - Begin with "Got it" in any form
      - Ask about teaching approach, sessions, or any specific field
      - Be fewer than 6 sentences
      - Call show_options

      After playback is confirmed, call update_setup with a `courseContext` field — a 3-5 sentence
      third-person synthesis for the voice AI.

      ## Subject → Course (CRITICAL)
      Subject = broad discipline (subjectDiscipline): "English Language", "Biology"
      Course = specific offering (courseName): "GCSE Biology", "11+ Comprehension"
      NEVER put a subject name into courseName or vice versa.

      ## Graph-driven priorities

      Readiness: 0% | Can launch: NO

      ### Already collected
        (nothing yet)

      ### What to ask next (priority order)
        1. Organisation name [free-text] → (HANDLE THIS NEXT)
           Ask for their school or organisation name.
           [REQUIRED for launch]
        2. Course name [free-text]
           Specific offering within the subject.
           [REQUIRED for launch]
        3. Teaching approach [options]
           PROPOSE: infer best fit from subject/level.
           [REQUIRED for launch]
        ... and 10 more fields available

      ### Still required for launch
        ✗ Organisation name
        ✗ Course name
        ✗ Teaching approach

      ## Rules
      1. Call update_setup EVERY time you learn new information.
         Extract ALL fields from a single message in ONE update_setup call.
      2. **EVERY response MUST contain natural-language text. No exceptions.**
      4. PROPOSE, DON'T ASK — infer the best fit and propose, don't drip-feed questions.

      ---
      The educator says: {{userMessage}}

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      max_tokens: 1500
      tools:
        - name: update_setup
          description: >-
            Save one or more extracted data fields. Call EVERY time you learn new information.
            Valid field keys: institutionName, typeSlug, websiteUrl, courseName, subjectDiscipline,
            interactionPattern, teachingMode, welcomeMessage, sessionCount, durationMins,
            planEmphasis, behaviorTargets, lessonPlanModel, physicalMaterials,
            personalityPreset, personalityDescription, courseContext,
            assessmentTargets, constraints, defaultDomainKind,
            contentSkipped, welcomeSkipped, tuneSkipped.
            assessmentTargets = array of specific measurable outcomes. Only extract when explicitly stated.
            constraints = array of things the AI must NEVER do. Only extract when explicitly stated.
            Use EXACTLY these key names — other names will be silently dropped.
          input_schema:
            type: object
            properties:
              fields:
                type: object
                description: "Key-value pairs. Keys MUST be from the valid field names list above."
                additionalProperties: true
            required: [fields]
        - name: show_suggestions
          description: "Show clickable quick-reply chips (confirmation/skip only)"
          input_schema:
            type: object
            properties:
              question: { type: string }
              suggestions: { type: array, items: { type: string } }
            required: [question, suggestions]
        - name: show_options
          description: "Show structured option card inline in chat"
          input_schema:
            type: object
            properties:
              question: { type: string }
              dataKey: { type: string }
              mode: { type: string }
              options: { type: array }
            required: [question, dataKey, mode, options]

tests:

  # ── Rich intake → extract all + playback ────────────────────────────────

  - description: "INTAKE: Rich message → extracts multiple fields in one update_setup"
    vars:
      userMessage: "I'm setting up a GCSE English Language course at Greenwood Academy. The students are Year 10, and I want to use a Socratic approach — questioning them to build comprehension. Probably 8 sessions of 30 minutes each."
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup — should extract all fields from rich intake' };
          const fields = update.args?.fields || update.args || {};
          let count = 0;
          if (fields.institutionName) count++;
          if (fields.courseName || fields.subjectDiscipline) count++;
          if (fields.interactionPattern) count++;
          if (fields.sessionCount) count++;
          if (fields.durationMins) count++;
          if (count < 3) return { pass: false, score: 0, reason: `Only extracted ${count} fields — should extract all inferable fields` };
          return true;

  - description: "INTAKE: Rich intake → triggers playback (not field questions)"
    vars:
      userMessage: "I'm creating a course in Hebrew for adult converts to Judaism. They need to pass the Beit Din and use Hebrew practically in prayers. I teach each letter with its cultural, historical, and religious context."
    assert:
      - type: llm-rubric
        value: "Response is a rich playback (6+ sentences) reflecting back the course concept, learner profile, and teaching philosophy. Does NOT ask about teaching approach, sessions, or institution. Ends with a confirmation question like 'Does that capture it?'"
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const textPart = _out.split('"type":"tool_use"')[0].trim();
          const wordCount = textPart.split(/\s+/).length;
          if (wordCount < 60) return { pass: false, score: 0, reason: `Playback too short (${wordCount} words) — must be 6-10 sentences` };
          return true;

  - description: "INTAKE: Playback does NOT begin with 'Got it'"
    vars:
      userMessage: "Biology tutoring for A-level students preparing for Edexcel exams. I want structured lessons."
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const textPart = _out.split('"type":"tool_use"')[0].trim();
          if (textPart.toLowerCase().startsWith('got it')) {
            return { pass: false, score: 0, reason: 'Playback must NOT start with "Got it"' };
          }
          return true;

  - description: "INTAKE: Playback does NOT call show_options"
    vars:
      userMessage: "I teach maths to GCSE students, socratic approach, need 5 sessions"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const opts = _tc.find(t => t.name === 'show_options');
          if (opts) return { pass: false, score: 0, reason: 'show_options called during playback — field choices come after playback confirmation' };
          return true;

  - description: "INTAKE: Playback calls show_suggestions with confirmation chips"
    vars:
      userMessage: "English Language comprehension course for Year 10, Socratic approach"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const sugg = _tc.find(t => t.name === 'show_suggestions');
          if (!sugg) return { pass: false, score: 0, reason: 'No show_suggestions — playback should end with confirmation chips' };
          const chips = (sugg.args?.suggestions || []).map(s => s.toLowerCase());
          const hasConfirm = chips.some(c => c.includes("that's right") || c.includes('sounds right') || c.includes('correct'));
          if (!hasConfirm) return { pass: false, score: 0, reason: `No confirmation chip in: ${chips.join(', ')}` };
          return true;

  # ── Minimal intake still gets playback ──────────────────────────────────

  - description: "INTAKE: Even brief input gets 6+ sentence playback (infers context)"
    vars:
      userMessage: "11+ English Comprehension, 6 sessions"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const textPart = _out.split('"type":"tool_use"')[0].trim();
          const wordCount = textPart.split(/\s+/).length;
          if (wordCount < 50) return { pass: false, score: 0, reason: `Even minimal intake needs 6+ sentence playback (got ${wordCount} words)` };
          return true;
      - type: llm-rubric
        value: "Despite brief input, expands into a rich playback that INFERS the likely learner profile (10-11 year olds, selective school prep), teaching goals, and what sessions might cover."

  # ── Assessment targets + constraints extraction ──────────────────────

  - description: "INTAKE: Rich description with assessment target → extracts assessmentTargets"
    vars:
      userMessage: "I'm teaching Hebrew to adult converts preparing for the Beit Din exam. They need to read from the Siddur fluently. I never drill vocabulary in isolation — every letter must connect to cultural and religious context."
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup call' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.assessmentTargets && !fields.courseName) return { pass: false, score: 0, reason: 'No fields extracted at all' };
          const hasAssessment = fields.assessmentTargets && Array.isArray(fields.assessmentTargets) && fields.assessmentTargets.some(t => t.toLowerCase().includes('beit din'));
          if (!hasAssessment) return { pass: false, score: 0.5, reason: `assessmentTargets missing or does not mention Beit Din: ${JSON.stringify(fields.assessmentTargets)}` };
          return true;

  - description: "INTAKE: Rich description with constraints → extracts constraints"
    vars:
      userMessage: "I'm teaching Hebrew to adult converts preparing for the Beit Din exam. They need to read from the Siddur fluently. I never drill vocabulary in isolation — every letter must connect to cultural and religious context."
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup call' };
          const fields = update.args?.fields || update.args || {};
          const hasConstraints = fields.constraints && Array.isArray(fields.constraints) && fields.constraints.some(c => c.toLowerCase().includes('isolation') || c.toLowerCase().includes('drill'));
          if (!hasConstraints) return { pass: false, score: 0.5, reason: `constraints missing or does not capture "never drill vocabulary in isolation": ${JSON.stringify(fields.constraints)}` };
          return true;

  - description: "INTAKE: Minimal input without assessment language → does NOT invent assessmentTargets"
    vars:
      userMessage: "I teach conversational French to adults, 6 sessions of 20 minutes"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup call' };
          const fields = update.args?.fields || update.args || {};
          if (fields.assessmentTargets && fields.assessmentTargets.length > 0) {
            return { pass: false, score: 0, reason: `Invented assessmentTargets when teacher never mentioned any: ${JSON.stringify(fields.assessmentTargets)}` };
          }
          return true;

  # ── Content-first intake (upload before describing) ──────────────────────

  - description: "INTAKE: Content upload message → triggers playback, not field questions"
    vars:
      userMessage: "Teaching materials uploaded — I've added my GCSE English past papers and a comprehension textbook."
    assert:
      - type: llm-rubric
        value: "Responds with a rich playback (6+ sentences) reflecting what the uploaded materials suggest about the course. Does NOT jump to asking about teaching approach or sessions. Ends with a confirmation question."
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const opts = _tc.find(t => t.name === 'show_options');
          if (opts) return { pass: false, score: 0, reason: 'show_options called during content-first playback — should do playback first' };
          return true;

  # ── courseContext synthesis after playback confirmation ───────────────────

  - description: "INTAKE: Playback confirmation → saves courseContext via update_setup"
    vars:
      userMessage: "That's right"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _tc = output.tool_calls || _out.split('\n').flatMap(l => { try { const b = JSON.parse(l.trim()); return b.type === 'tool_use' ? [{name: b.name, args: b.input || {}}] : []; } catch(e) { return []; } });
          const update = _tc.find(t => t.name === 'update_setup');
          if (!update) return { pass: false, score: 0, reason: 'No update_setup after playback confirmation — courseContext not saved' };
          const fields = update.args?.fields || update.args || {};
          if (!fields.courseContext) return { pass: false, score: 0, reason: 'courseContext not saved — this feeds the voice AI on every call' };
          return true;

  # ── No XML tags in playback ─────────────────────────────────────────────

  - description: "INTAKE: Playback contains no XML tags"
    vars:
      userMessage: "GCSE English Language for Year 10 at Greenwood Academy, socratic approach, 8 sessions"
    assert:
      - type: javascript
        value: |
          const _out = typeof output === 'string' ? output : JSON.stringify(output);
          const _text = _out.split('{"type":"tool_use"')[0].trim();
          const xmlTagPattern = /<\/?(?:parameter|option|field|value|config)[^>]*>/i;
          if (xmlTagPattern.test(_text)) {
            return { pass: false, score: 0, reason: `XML tags found in playback: ${_text.match(xmlTagPattern)[0]}` };
          }
          return true;
