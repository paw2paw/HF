# Cloud Build config for the migrate (schema migration) image.
# Uses Kaniko layer caching — deps layer cached when package.json unchanged.
#
# Usage:
#   cd apps/admin
#   gcloud builds submit --config cloudbuild-migrate.yaml \
#     --project hf-admin-prod --region europe-west2 \
#     --substitutions=_TAG=latest .

substitutions:
  _TAG: latest

steps:
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=Dockerfile'
      - '--context=.'
      - '--target=migrate'
      - '--destination=europe-west2-docker.pkg.dev/hf-admin-prod/hf-docker/hf-migrate:${_TAG}'
      - '--cache=true'
      - '--cache-repo=europe-west2-docker.pkg.dev/hf-admin-prod/hf-docker/hf-migrate/cache'
      - '--cache-ttl=720h'
      - '--snapshot-mode=redo'
      - '--compressed-caching=false'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  diskSizeGb: 500
